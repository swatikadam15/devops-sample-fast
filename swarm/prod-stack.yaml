version: "3.8"

services:
  client-a:
    image: swatikadam16/client-a-node-app:${IMAGE_TAG}
    ports:
      - "8002:3000"   # production port
    networks:
      - app-network
    deploy:
      replicas: 3

      restart_policy:
        condition: any

      update_config:
        parallelism: 1
        delay: 10s
        order: start-first   # zero downtime deployment

      placement:
        constraints:
          - node.role == worker

    secrets:
      - client_a_db

    environment:
      - NODE_ENV=production


networks:
  app-network:
    external: true

secrets:
  client_a_db:
    external: true