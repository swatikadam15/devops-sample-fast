version: "3.8"

services:
  client-a:
    image: swatikadam16/client-a-node-app:${IMAGE_TAG}
    ports:
      - "3002:3000"   # different port to avoid conflict with dev
    networks:
      - app-network
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 10s
    secrets:
      - client_a_db
    environment:
      - NODE_ENV=staging


networks:
  app-network:
    external: true

secrets:
  client_a_db:
    external: true

