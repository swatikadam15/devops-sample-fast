name: Deploy

on:
  push:
    branches:
      - dev
      - stage
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      # 1️⃣ Checkout code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Docker login
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 3️⃣ Set ENV + IMAGE TAG ✅
      - name: Set Environment
        run: |
          echo "Full ref: $GITHUB_REF"
          BRANCH_NAME=${GITHUB_REF#refs/heads/}
          echo "Branch: $BRANCH_NAME"

          if [[ "$BRANCH_NAME" == "master" ]]; then
            echo "ENV=dev" >> $GITHUB_ENV
            echo "STACK_FILE=dev-stack.yaml" >> $GITHUB_ENV
          elif [[ "$BRANCH_NAME" == "stage" ]]; then
            echo "ENV=stage" >> $GITHUB_ENV
            echo "STACK_FILE=stage-stack.yaml" >> $GITHUB_ENV
          else
            echo "ENV=prod" >> $GITHUB_ENV
            echo "STACK_FILE=prod-stack.yaml" >> $GITHUB_ENV
          fi

          echo "IMAGE_TAG=${ENV}-${GITHUB_SHA}" >> $GITHUB_ENV

      # 4️⃣ Debug
      - name: Debug
        run: |
          echo "ENV=$ENV"
          echo "STACK_FILE=$STACK_FILE"
          echo "IMAGE_TAG=$IMAGE_TAG"
          ls -R swarm/

      # 5️⃣ Build image (ENV TAG) ✅
      - name: Build Docker image
        run: |
          docker build -t swatikadam16/client-a-node-app:${IMAGE_TAG} .

      # 6️⃣ Push image ✅
      - name: Push Docker image
        run: |
          docker push swatikadam16/client-a-node-app:${IMAGE_TAG}

      # 7️⃣ Setup SSH
      - name: Setup SSH
        run: |
          echo "${{ secrets.SSH_KEY }}" > private_key.pem
          chmod 600 private_key.pem

      # 8️⃣ Test SSH
      - name: Test SSH connection
        run: |
          nc -zv ${{ secrets.SSH_HOST }} 22
          ssh -i private_key.pem -o StrictHostKeyChecking=no \
          ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "echo Connected"

      # 9️⃣ Copy stack file
      - name: Copy stack file
        run: |
          scp -i private_key.pem -o StrictHostKeyChecking=no \
          swarm/${{ env.STACK_FILE }} \
          ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/home/${{ secrets.SSH_USER }}/

      # 🔟 Deploy to Swarm (UPDATED) ✅
      - name: Deploy
        run: |
          ssh -i private_key.pem -o StrictHostKeyChecking=no \
          ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} <<EOF

          export IMAGE_TAG=${IMAGE_TAG}

          echo "Deploying ${{ env.STACK_FILE }} with IMAGE_TAG=$IMAGE_TAG"

          docker stack deploy -c /home/${{ secrets.SSH_USER }}/${{ env.STACK_FILE }} multi-client

          EOF

